version: "3.8"

services:
  enrichment-worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: enrichment-worker
    restart: unless-stopped
    ports:
      - "8090:8090"
    environment:
      - PORT=8090
      - WEBHOOK_SECRET=${WEBHOOK_SECRET}
      - ERPNEXT_URL=${ERPNEXT_URL}
      - ERPNEXT_API_KEY=${ERPNEXT_API_KEY}
      - ERPNEXT_API_SECRET=${ERPNEXT_API_SECRET}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-}
      - DISABLE_TEST_ENDPOINT=${DISABLE_TEST_ENDPOINT:-false}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8090/health"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  default:
    name: primitivemail_default
    external: true
